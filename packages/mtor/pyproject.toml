[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[project]
name = "mtor"
version = "0.1.0"
description = "Architect-implementer dispatch for AI coding agents. Smart model plans, cheap model builds."
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Terry Li" }]
keywords = ["ai", "agents", "coding", "dispatch", "llm", "orchestration"]
dependencies = ["cyclopts>=3"]

[project.optional-dependencies]
temporal = ["temporalio>=1.7"]

[project.scripts]
mtor-pkg = "mtor.cli:app"

[dependency-groups]
dev = ["pytest>=9"]

[tool.hatch.build.targets.wheel]
packages = ["mtor"]

[tool.pytest.ini_options]
testpaths = ["assays"]
