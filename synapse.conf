# synapse.conf — signal transduction thresholds for synapse.py (UserPromptSubmit hook)
#
# These values were originally hardcoded in ~/.claude/hooks/synapse.py.
# A periodic LLM review can adjust them based on fire-rate and accuracy data.
#
# tier_authority: which tier may adjust each threshold
#   membrane   — autonomous self-adjustment (safe, low-impact)
#   nucleus    — requires human (Terry) review before change
#
# Signal source for LLM review:
#   ~/.claude/nudge-log.jsonl   — hook fire counts and predictions (hebbian_nudge.py)

[mitogen]

# Number of times mitogen may nudge per session before suppressing further nudges.
# Bounds: [1, 10]
# tier_authority: nucleus
mit_threshold = 3

[association]

# Minimum TF-IDF score for a Reference doc to be injected as context.
# Lower = more injections (noisier); higher = fewer (risk of missing relevant docs).
# Bounds: [0.5, 5.0]
# tier_authority: membrane
min_score = 1.5

# Maximum number of Reference docs injected per prompt.
# Bounds: [1, 10]
# tier_authority: membrane
top_k = 3

# Seconds to wait before running association retrieval again (debounce).
# Prevents hammering on rapid multi-turn sessions.
# Bounds: [60, 1800]
# tier_authority: membrane
debounce_seconds = 300

[burn]

# Hours before weekly reset to auto-activate burn mode.
# Bounds: [1.0, 12.0]
# tier_authority: membrane
hours_threshold = 6.0

# Minimum weekly utilization (%) to trigger auto burn mode.
# Below this threshold, there's enough budget left -- no need to burn.
# Bounds: [50.0, 95.0]
# tier_authority: membrane
util_threshold = 70.0

[calorimetry]

# Minimum seconds between respirometry autolog calls.
# Bounds: [300, 7200]
# tier_authority: membrane
cal_interval = 1800
