name: Wake soma on queue push
on:
  push:
    paths:
      - 'loci/golem-queue.md'

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - name: Start soma if stopped
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          STATE=$(curl -s -H "Authorization: Bearer $FLY_API_TOKEN" \
            https://api.machines.dev/v1/apps/soma/machines | \
            python3 -c "import sys,json; ms=json.load(sys.stdin); print(ms[0]['state'] if ms else 'none')")

          echo "Current state: $STATE"

          if [ "$STATE" = "stopped" ] || [ "$STATE" = "suspended" ]; then
            MID=$(curl -s -H "Authorization: Bearer $FLY_API_TOKEN" \
              https://api.machines.dev/v1/apps/soma/machines | \
              python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])")
            curl -s -X POST -H "Authorization: Bearer $FLY_API_TOKEN" \
              "https://api.machines.dev/v1/apps/soma/machines/$MID/start"
            echo "Start request sent for machine $MID"
          else
            echo "Machine is $STATE — no action needed"
          fi
