      fall back to Latent Space / Import AI which cover Anthropic announcements.

  - name: Claude Code Changelog
    url: https://github.com/anthropics/claude-code/blob/main/CHANGELOG.md
    rss: https://github.com/anthropics/claude-code/releases.atom
    focus: Claude Code feature velocity — agentic loops, MCP, parallel agents, model defaults
    tier: 2
    cadence: weekly
    notes: |
      Tracks CC releases at practitioner level. Useful for Capco consulting lens:
      feature direction signals where AI dev tooling is heading. Weekly releases,
      low noise. Complements Anthropic Blog (research/policy) with product specifics.

  - name: Azure AI Updates
    url: https://azure.microsoft.com/en-us/updates/
    rss: https://www.microsoft.com/releasecommunications/api/v2/azure/rss
    focus: Azure OpenAI Service, AI Foundry, Copilot Studio — what bank clients on Azure are working with
    tier: 2
    cadence: weekly
    notes: |
      Full Azure release communications feed (200 entries, clean XML, no auth).
      Not AI-filtered — scan titles for AI/OpenAI/Copilot/cognitive keywords.
      Key for "what can we do with Azure OpenAI" client conversations. Banks default
      to Azure for compliance/data residency reasons, so this stack matters more than
      AWS for most Capco clients.
      Old category-filtered URL (azure.microsoft.com/en-us/updates/feed/?category=...)
      301-redirects to a broken JS page (0 entries) as of Mar 2026.

