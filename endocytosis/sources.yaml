# AI News Sources Configuration
# All sources fetched by cron (cadence-gated). Tier controls display priority:
# Tier 1: Always surfaced in /ai-news
# Tier 2: Surfaced only if noteworthy, or in deep mode
#
# cadence: daily | twice_weekly | weekly | biweekly | monthly
#   Used by cron to skip sources unlikely to have new content since last fetch.
# rss: Direct RSS/Atom feed URL (preferred for cron — structured, reliable)
# url: Web page URL (fallback — needs HTML scraping)

web_sources:
  # General AI News
  - name: Simon Willison
    url: https://simonwillison.net
    rss: https://simonwillison.net/atom/everything/
    focus: LLMs, open source, hands-on
    tier: 1
    cadence: daily

  - name: Shreya Shankar
    url: https://www.sh-reya.com
    rss: https://www.sh-reya.com/rss.xml
    focus: LLM evals research, data-centric AI, evaluation methodology (UC Berkeley PhD)
    tier: 1
    cadence: monthly
    notes: |
      Co-teaches AI Evals course with Hamel Husain. Research on why error analysis
      must precede evaluator design. Complements Hamel's practitioner angle with
      academic rigour.

  - name: Hamel Husain
    url: https://hamel.dev
    rss: https://hamel.dev/index.xml
    focus: LLM evals, AI product quality, coding agents, practical AI engineering (Parlance Labs)
    tier: 1
    cadence: monthly
    notes: |
      Email unsubscribed Mar 2026 — covered by RSS. Publishes evals frameworks,
      skills for coding agents, and practitioner guides from 50+ company experience.

  - name: Eugene Yan
