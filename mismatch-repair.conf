# mismatch-repair.conf -- signal transduction parameters
#
# Periodically reviewed and adjusted by LLM (see tier_authority below).
# Schema: key = value  |  # comment  |  blank lines ignored.
# Changes here take effect on next run without code changes.
#
# tier_authority:
#   haiku   -- may adjust: days, max_per_session, snippet_cap,
#               correction_snippets_cap, sample_cap, session_sample_cap,
#               correction_threshold
#   sonnet+ -- may adjust: correction_patterns (add / remove entries)
#
# Signal source for accuracy feedback:
#   ~/.local/share/vivesca/signals.jsonl  (kind: anam_scan_daily / anam_scan_weekly)
#   ~/germline/loci/copia/anam-scan-YYYY-MM-DD.md  (daily briefs)
# Accuracy proxy: correction_count trend vs. memory-update rate in weekly briefs.

[scan]
# ── Scan window ───────────────────────────────────────────────────────────────
# How many days back daily_scan reads by default (--days overrides at CLI).
days = 1

# ── Per-session extraction ────────────────────────────────────────────────────
# Max user prompts sampled per session for topic analysis.
max_per_session = 3

# Max correction snippets stored per session (keeps output bounded).
snippet_cap = 5

# ── LLM sample caps ──────────────────────────────────────────────────────────
# Max correction snippets fed to haiku for classification.
correction_snippets_cap = 50

# Max sessions fed to haiku for topic extraction.
session_sample_cap = 60

# ── Notification threshold ────────────────────────────────────────────────────
# ACTA post fires when total corrections exceed this value.
correction_threshold = 10

# ── Correction detection patterns (sonnet+ authority) ────────────────────────
# One regex per line. re.IGNORECASE applied automatically.
# Add / remove lines to tune precision vs. recall.
# Haiku must NOT edit this section.
[correction_patterns]
\bno[,.]?\s+(not|that|wrong)
\bactually[,.]
\bi meant\b
\bthat'?s not (right|correct|what)
\byou sure\b
\bwrong\b
\bnope\b
\bincorrect\b
\bnot what i\b
\bstop\b.*\bdo(ing)?\b
