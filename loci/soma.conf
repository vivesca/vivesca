[supervisord]
nodaemon=true
logfile=/home/vivesca/tmp/supervisord.log
pidfile=/tmp/supervisord.pid
user=root

[unix_http_server]
file=/tmp/supervisor.sock
chmod=0777

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:vivesca]
; TODO: after next `fly deploy` or machine restart, remove supervisor-env wrapper
; (Fly secrets now staged for EXA/TAVILY/SERPER/JINA/FIRECRAWL/XAI/PERPLEXITY)
command=/home/vivesca/germline/effectors/supervisor-env /home/vivesca/germline/.venv/bin/vivesca serve --http
directory=/home/vivesca/germline
user=vivesca
autostart=true
autorestart=true
stdout_logfile=/home/vivesca/tmp/mcp-server.log
stderr_logfile=/home/vivesca/tmp/mcp-server.log

[program:soma-watchdog]
command=python3 /home/vivesca/germline/effectors/soma-watchdog
directory=/home/vivesca/germline
user=vivesca
autostart=true
autorestart=true
stdout_logfile=/home/vivesca/tmp/soma-watchdog.log
stderr_logfile=/home/vivesca/tmp/soma-watchdog.log
environment=HOME="/home/vivesca",TZ="Asia/Hong_Kong",PATH="/home/vivesca/germline/.venv/bin:/home/vivesca/.local/bin:/usr/local/bin:/usr/bin:/bin"

[program:supercronic]
command=/home/vivesca/.local/bin/supercronic /home/vivesca/germline/loci/crontab
directory=/home/vivesca/germline
user=vivesca
autostart=true
autorestart=true
stdout_logfile=/home/vivesca/tmp/supercronic.log
stderr_logfile=/home/vivesca/tmp/supercronic.log
environment=HOME="/home/vivesca",TZ="UTC",PATH="/home/vivesca/germline/.venv/bin:/home/vivesca/germline/effectors:/home/vivesca/.local/bin:/home/vivesca/.cargo/bin:/usr/local/bin:/usr/bin:/bin"

[program:tailscaled]
command=tailscaled --state=/tmp/tailscale.state
directory=/
user=root
autostart=true
autorestart=true
stdout_logfile=/home/vivesca/tmp/tailscaled.log
stderr_logfile=/home/vivesca/tmp/tailscaled.log
