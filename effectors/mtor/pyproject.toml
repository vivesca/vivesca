[build-system]
build-backend = "hatchling.build"

requires = [ "hatchling" ]

[project]
name = "mtor"
version = "0.1.0"
description = "Agent-first translation controller — dispatch, inspect, and manage ribosome workflows via Temporal"
requires-python = ">=3.11"
classifiers = [
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
]
dependencies = [
  "cyclopts",
  "porin",
  "temporalio>=1.7",
]

scripts.mtor = "mtor.cli:app"

[dependency-groups]
dev = [
  "pytest>=9.0.2",
]

[tool.hatch.build.targets.wheel]
packages = [ "mtor" ]

[tool.pytest.ini_options]
testpaths = [ "assays" ]
