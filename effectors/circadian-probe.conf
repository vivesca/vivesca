# circadian-probe.conf — signal transduction parameters for AKM Heartbeat
# tier_authority: LLM review may adjust values within stated bounds.

[scan]
# How many days without modification before a note is considered stale.
# bounds: 7–90
stale_days = 30

# Maximum number of stale notes to include in the digest.
# bounds: 1–50
max_stale_report = 10

# Maximum number of orphan notes to include in the digest.
# bounds: 1–50
max_orphan_report = 10

# Days of proximity for prospective memory date triggers.
# bounds: 1–14
proximity_window_days = 3
