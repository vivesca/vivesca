services:
  postgresql:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-temporal}
      POSTGRES_USER: ${POSTGRES_USER:-temporal}
      POSTGRES_DB: ${POSTGRES_DB:-temporal}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - temporal-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-temporal}"]
      interval: 5s
      timeout: 3s
      retries: 5

  temporal-server:
    image: temporalio/auto-setup:latest
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_SEEDS=postgresql
      - POSTGRES_USER=${POSTGRES_USER:-temporal}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-temporal}
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address $$(hostname -i):7233 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  temporal-web:
    image: temporalio/web:latest
    depends_on:
      temporal-server:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal-server:7233
    ports:
      - "${TEMPORAL_WEB_PORT:-8080}:8080"

  temporal-admin-tools:
    image: temporalio/admin-tools:latest
    depends_on:
      temporal-server:
        condition: service_healthy
    environment:
      - TEMPORAL_CLI_ADDRESS=temporal-server:7233
    stdin_open: true
    tty: true

volumes:
  temporal-pgdata:
