version: "3.8"

services:
  postgresql:
    image: postgres:15
    container_name: temporal-postgresql
    environment:
      POSTGRES_USER: ${TEMPORAL_DB_USER:-temporal}
      POSTGRES_PASSWORD: ${TEMPORAL_DB_PASSWORD:-temporal}
      POSTGRES_DB: ${TEMPORAL_DB_NAME:-temporal}
    ports:
      - "${TEMPORAL_DB_PORT:-5432}:5432"
    volumes:
      - temporal-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEMPORAL_DB_USER:-temporal}"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - temporal-network

  temporal-server:
    image: temporalio/server:latest
    container_name: temporal-server
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgresql
      - DB_PORT=${TEMPORAL_DB_PORT:-5432}
      - DB_NAME=${TEMPORAL_DB_NAME:-temporal}
      - DB_USER=${TEMPORAL_DB_USER:-temporal}
      - DB_PASSWORD=${TEMPORAL_DB_PASSWORD:-temporal}
      - POSTGRES_USER=${TEMPORAL_DB_USER:-temporal}
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD:-temporal}
      - POSTGRES_SEEDS=postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    ports:
      - "${TEMPORAL_GRPC_PORT:-7233}:7233"
      - "${TEMPORAL_METRICS_PORT:-9090}:9090"
    volumes:
      - ./config/dynamicconfig:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - temporal-network

  temporal-web:
    image: temporalio/web:latest
    container_name: temporal-web
    depends_on:
      temporal-server:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal-server:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:${TEMPORAL_WEB_PORT:-8080}
    ports:
      - "${TEMPORAL_WEB_PORT:-8080}:8080"
    networks:
      - temporal-network

  temporal-admin-tools:
    image: temporalio/admin-tools:latest
    container_name: temporal-admin-tools
    depends_on:
      temporal-server:
        condition: service_healthy
    environment:
      - TEMPORAL_CLI_ADDRESS=temporal-server:7233
    stdin_open: true
    tty: true
    networks:
      - temporal-network

volumes:
  temporal-pgdata:

networks:
  temporal-network:
    driver: bridge
