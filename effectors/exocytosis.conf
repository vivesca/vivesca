# exocytosis.conf — signal transduction parameters for garden post pipeline
# tier_authority: LLM review may adjust values within stated bounds.

[generate]
# Max tokens for the generate (writer) model call.
# bounds: 200–4000
max_tokens_generate = 1000

[judge]
# Max tokens for the judge model call.
# bounds: 50–500
max_tokens_judge = 100

# Number of retry attempts if the first judge pass fails (0 = no retry).
# bounds: 0–5
judge_retry_count = 1

[judge_criteria]
# Criteria weights used in the JUDGE_PROMPT (HIGH/MED/LOW).
# Adjust weights to shift what the judge prioritises.
# bounds: each value must be one of HIGH, MED, LOW
clear_thesis = HIGH
evidence = HIGH
hook = MED
conclusion = MED
concise = LOW
