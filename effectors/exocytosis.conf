# exocytosis.conf — signal transduction parameters for garden post pipeline
# tier_authority: LLM review may adjust values within stated bounds.

[generate]
# Max tokens for the generate (writer) model call.
# bounds: 200–4000
max_tokens_generate = 1000

[censor]
# Max tokens for the censor model call.
# bounds: 50–500
max_tokens_censor = 100

# Number of retry attempts if the first censor pass fails (0 = no retry).
# bounds: 0–5
censor_retry_count = 1

[censor_criteria]
# Criteria weights used in the CENSOR_PROMPT (HIGH/MED/LOW).
# Adjust weights to shift what the censor prioritises.
# bounds: each value must be one of HIGH, MED, LOW
clear_thesis = HIGH
evidence = HIGH
hook = MED
conclusion = MED
concise = LOW
