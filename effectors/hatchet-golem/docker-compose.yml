services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hatchet
      POSTGRES_PASSWORD: hatchet
      POSTGRES_DB: hatchet
    ports:
      - "5435:5432"
    volumes:
      - hatchet-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hatchet"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  setup-config:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-admin:latest
    command: /hatchet/hatchet-admin quickstart --skip certs --generated-config-dir /hatchet/config --overwrite=false
    environment:
      DATABASE_URL: postgres://hatchet:hatchet@postgres:5432/hatchet?sslmode=disable
      SERVER_TASKQUEUE_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      SERVER_AUTH_COOKIE_DOMAIN: localhost
      SERVER_AUTH_COOKIE_INSECURE: "t"
      SERVER_GRPC_BIND_ADDRESS: 0.0.0.0
      SERVER_GRPC_INSECURE: "t"
      SERVER_GRPC_BROADCAST_ADDRESS: hatchet-engine:7077
    volumes:
      - hatchet-config:/hatchet/config
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  hatchet-engine:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-engine:latest
    command: /hatchet/hatchet-engine --config /hatchet/config
    restart: on-failure
    depends_on:
      setup-config:
        condition: service_completed_successfully
    ports:
      - "7077:7077"
    environment:
      DATABASE_URL: postgres://hatchet:hatchet@postgres:5432/hatchet?sslmode=disable
      SERVER_TASKQUEUE_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      SERVER_GRPC_BIND_ADDRESS: 0.0.0.0
      SERVER_GRPC_INSECURE: "t"
      SERVER_GRPC_BROADCAST_ADDRESS: hatchet-engine:7077
    volumes:
      - hatchet-config:/hatchet/config

  hatchet-dashboard:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-frontend:latest
    ports:
      - "8088:80"
    depends_on:
      hatchet-engine:
        condition: service_started

volumes:
  hatchet-pgdata:
  hatchet-config:
