title: "Cytokinesis — Session Consolidation"
name: "cytokinesis"
description: >
  Use when ending a session or wrapping up work. "wrap up", "end of session", "cytokinesis".
  Finishes outstanding work before consolidating — "wrap up" means complete then close.
instructions: |
  Execute the cytokinesis skill per SKILL.md.
  Key sequence: finish outstanding work → verification pass → audit signal → publish check → housekeeping → write G1 as wrap summary.
  G1 IS the summary — single source, displayed as final output.
prompt: "Execute the cytokinesis skill."
extensions:
  - type: builtin
    name: developer
    timeout: 300
    bundled: true
  - type: streamable_http
    name: vivesca
    uri: "http://127.0.0.1:8741/mcp"
