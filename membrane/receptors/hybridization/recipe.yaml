title: "Hybridization"
name: "hybridization"
description: "Stress-test bio naming — find gaps where the analogy breaks down. "naming audit"
instructions: |
  # Hybridization — Forced Naming as Design Constraint

  Hybridization probes a target (design problem) with a known sequence (bio name). Where the probe binds, the mechanism maps. Where it mismatches or denatures, the analogy breaks — and the break IS the finding.

  Single concept? One cycle. Full system? Sweep all organelles or pattern sets.

  ## Three Modes

  ### 1. Single Concept
  One cycle on one name — mine a biological mapping for design gaps.
  ```
  NAME   → honest biological mapping (verb first, process noun)
  STUDY  → 3-5 properties the biology actually has (fetch via lysin, not recall)
  COMPARE → which properties does the implementation have / lack?
  BREAK  → where the analogy fails is the design gap, not a flaw in the method
  BUILD  → implement the highest-value gap now
  ```
  Invoke when: one component needs a name, or an existing name hasn't been mined.

  **When renaming:** Don't pick the first bio word that sounds cool. Ask "what is the honest verb?" Find the process that does that verb. Run the cycle before committing the name.

  **When a name already exists:** Read the biology. Ask "which properties does our implementation lack?" The missing property IS the design insight.

  #### Validated examples

  | Name | Biology says | We had | Gap found | Built |
  |------|-------------|--------|-----------|-------|
  | respirometry | Measures efficiency (RQ), not just fuel level | Raw % gauge | Yield-per-token, sprint detection | Noted |
  | consolidation | Happens during sleep, not on calendar | Weekly schedule only | Post-session trigger | Stop hook (6h debounce) |
  | anamnesis | Selective — experienced doctor adjusts questions | Uniform loading | Keyword-relevance reordering | Primacy-based loading |
  | ecphory | Cue-trace interaction; memory-type routing; reconstructive | Uniform sweep | Route by episodic/semantic + age | Built: /ecphory |
  | sporulation | Environmentally triggered, not user-initiated; mother cell flushes before lysing | User-initiated only | Auto-suggest at budget=red; flush before checkpoint | Built |
  | endocytosis | Pathway selection is cargo-dependent; endosome sorts after intake | Each skill reimplemented fetch | Canonical routing table; intake/processing separation | Built |

  The naming convention isn't decoration — it's a design review tool. Every bio name is a hypothesis: "this component behaves like [biological process]." Study the biology, check whether the implementation matches. Mismatches are design gaps.

  ### 2. System Audit — Organelle Completeness
  Map the system against the canonical cell organelle set. Score each: **mapped / partial / gap**.

  | Organelle | Function | System equivalent | Score |
  |-----------|----------|-------------------|-------|
  | Membrane | Selective permeability; receptor surface | ? | |
  | Nucleus | Genome; policy; canonical rules | ? | |
  | ER (rough) | Translation; protein synthesis | ? | |
  | Golgi | Post-processing; packaging; addressing | ? | |
  | Mitochondria | Energy production; ATP; yield signal | ? | |
  | Lysosomes | Degradation; quality control; recycling | ? | |
  | Cytoskeleton | Shape; transport tracks; structural integrity | ? | |
  | Ribosomes | Execution units; workers | ? | |
  | Vacuole | Storage; buffering excess | ? | |
  | Centrosome | Division coordination; timing | ? | |

  Output: completed table + top 3 gaps ranked by operational impact.

  ### 3. Andrews 21 Patterns
  Hybridize against the 21 design patterns. Reference: `~/epigenome/chromatin/euchromatin/andrews-21-patterns-titration.md`.
  Score each pattern: **implemented / partial / absent**. Surface the highest-leverage absences.

  ## Grounding Step

  Before any mapping, fetch the real biology. Symbiont recall is lossy — hybridizing against a hallucination produces decorative names, not design insights.

  ```
  lysin "<term>"              # summary + mechanism
  lysin "<term>" --full       # all sections
  lysin "<term>" --json       # structured output for programmatic use
  ```

  Run `lysin` for every biological name in the hybridization. Read the mechanism. Only then map.

  ## Key Principles

  - **The break is the insight.** Where the analogy fails is not a problem — it is the finding. Mine it.
  - **One abstraction level.** Cell only. Don't mix in organ-level (liver) or ecosystem-level (rainforest). Mixing levels produces decorative metaphors, not design gaps.
  - **Cosplay test.** If renaming a component doesn't generate a new design question, revert. The name must do work.
  - **Boundary rule.** Cell concept = bio name. Runtime mechanic = platform name. `nucleus` is a bio name; `sqlite` is a platform name. Both can coexist in the same component.

  ## Anti-patterns

  - Stopping at the match (match = 10% of value; gap = 90%)
  - Forcing a mapping that doesn't hold — the naming test IS the design test
  - Running hybridization without committing to the output table — gaps not written down are gaps not closed
