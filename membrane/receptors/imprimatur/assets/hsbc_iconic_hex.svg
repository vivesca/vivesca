<?xml version="1.0" encoding="utf-8"?>
<!-- HSBC Iconic Hexagon — 4 red triangles + white centre rectangle.
     The standard HSBC mark (HSBC_MASTERBRAND_LOGO_WW_RGB hex portion only).
     Use over clean white/light backgrounds, or where the hex should not be transparent. -->
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" viewBox="0 0 170.1 85.1" xml:space="preserve">
<rect x="42.6" width="85" height="85" fill="#ffffff"/>
<polygon points="170.1,42.6 127.6,0 127.6,85.1" fill="#db0011"/>
<polygon points="85.1,42.6 127.6,0 42.6,0" fill="#db0011"/>
<polygon points="0,42.6 42.6,85.1 42.6,0" fill="#db0011"/>
<polygon points="85.1,42.6 42.6,85.1 127.6,85.1" fill="#db0011"/>
</svg>
