# respiration_sensor.conf — signal transduction parameters for token budget thresholds
# tier_authority: LLM review may adjust values within stated bounds.

[thresholds]
# Budget utilisation (%) below which the organism is SAFE.
# bounds: 10–80
threshold_safe = 50

# Budget utilisation (%) below which the organism is in CAUTION (above SAFE).
# bounds: 20–90
threshold_caution = 70

# Budget utilisation (%) below which the organism is in WARNING (above CAUTION).
# Above this value is DANGER.
# bounds: 30–99
threshold_warning = 85
