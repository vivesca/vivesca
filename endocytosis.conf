# endocytosis.conf — signal transduction thresholds for endocytosis_rss digest
#
# These values were originally hardcoded in digest.py.
# A periodic LLM review can adjust them based on engagement signal.
#
# tier_authority: which tier may adjust each threshold
#   membrane   — autonomous self-adjustment based on engagement signal
#   nucleus    — requires human (Terry) review before change
#
# Signal source for LLM review:
#   ~/.cache/lustro/engagement.jsonl

[thresholds]

# Score at or above which an item is transcytosed (★) to the client surface.
# Bounds: [5, 10]
# tier_authority: nucleus
weekly_transcytose_threshold = 7

# Score at or above which an item is retained in the weekly digest (endosome store).
# Items below this are degraded (lysosomal fate).
# Bounds: [1, weekly_transcytose_threshold]
# tier_authority: membrane
weekly_store_threshold = 5

# Maximum number of thematic clusters in the monthly digest.
# Bounds: [4, 16]
# tier_authority: membrane
default_theme_count = 8
