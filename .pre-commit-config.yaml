repos:
  # ── pre-commit (staged files only) ──────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: []
        exclude: ^membrane/receptors/\.system/
        stages: [pre-commit]
      - id: ruff-format
        exclude: ^membrane/receptors/\.system/
        stages: [pre-commit]

  - repo: https://github.com/crate-ci/typos
    rev: v1.32.0
    hooks:
      - id: typos
        stages: [pre-commit]
        exclude: ^(membrane/receptors/\.system/|uv\.lock)

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.6.0
    hooks:
      - id: pyproject-fmt
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: ty
        name: ty (type check)
        entry: uv run --no-sync ty check
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]

      - id: codespell
        name: codespell
        entry: uv run --no-sync codespell --skip='*/huashu-nuwa/*,*/huashu-extracts/*,*/munger/*' --ignore-words-list='pres' src/ effectors/ assays/ membrane/
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: no-lint-suppression
        name: ban noqa / type-ignore
        entry: hooks/no-lint-suppression
        language: script
        types: [python]
        exclude: ^assays/
        stages: [pre-commit]

      - id: memory-budget
        name: MEMORY.md line budget
        entry: hooks/memory-budget
        language: script
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: anatomy-refresh
        name: anatomy.md auto-refresh
        entry: bash -c 'uv run --no-sync python3 -c "from metabolon.resources.anatomy import express_anatomy; open(\"anatomy.md\",\"w\").write(express_anatomy())" && git add anatomy.md'
        language: system
        pass_filenames: false
        files: ^src/
        stages: [pre-commit]

  # ── pre-push (full checks) ─────────────────────────────────────────────
  - repo: https://github.com/pypa/pip-audit
    rev: v2.10.0
    hooks:
      - id: pip-audit
        args: [--skip-editable, --ignore-vuln, CVE-2026-3219, --ignore-vuln, CVE-2026-6357]
        stages: [pre-push]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        stages: [pre-commit, pre-push]

  - repo: local
    hooks:
      - id: deptry
        name: deptry (unused/missing deps)
        entry: uv run deptry src
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      # temporal-tests hook removed — polysome effector was culled 2026-04-12

      - id: ci-full-suite
        name: CI (full test suite on ganglion, async)
        entry: bash -c 'nohup ci-push > /dev/null 2>&1 &'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
