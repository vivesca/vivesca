repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        exclude: ^membrane/receptors/\.system/
        stages: [pre-commit]
      - id: ruff-format
        exclude: ^membrane/receptors/\.system/
        stages: [pre-commit]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        additional_dependencies:
          - tomli
        stages: [pre-commit]

  - repo: https://github.com/pypa/pip-audit
    rev: v2.10.0
    hooks:
      - id: pip-audit
        args: [--skip-editable]
        stages: [pre-push]

  - repo: local
    hooks:
      - id: temporal-tests
        name: temporal tests
        entry: bash -c 'HYPOTHESIS_DATABASE_FILE=/tmp/.hypothesis uv run pytest assays/test_golem_dispatch_enzyme.py assays/test_temporal_golem.py -x -q -p no:cacheprovider -p no:hypothesis'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
