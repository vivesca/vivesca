repos:
  # ── pre-commit (staged files only) ──────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: []
        exclude: ^membrane/receptors/\.system/
        stages: [pre-commit]
      - id: ruff-format
        exclude: ^membrane/receptors/\.system/
        stages: [pre-commit]

  - repo: https://github.com/crate-ci/typos
    rev: v1.32.0
    hooks:
      - id: typos
        stages: [pre-commit]
        exclude: ^(membrane/receptors/\.system/|uv\.lock)

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.6.0
    hooks:
      - id: pyproject-fmt
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: ty
        name: ty (type check)
        entry: uv run --no-sync ty check
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]

      - id: codespell
        name: codespell
        entry: uv run --no-sync codespell src/ effectors/ assays/ membrane/
        language: system
        pass_filenames: false
        stages: [pre-commit]

  # ── pre-push (full checks) ─────────────────────────────────────────────
  - repo: https://github.com/pypa/pip-audit
    rev: v2.10.0
    hooks:
      - id: pip-audit
        args: [--skip-editable]
        stages: [pre-push]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        stages: [pre-push]

  - repo: local
    hooks:
      - id: deptry
        name: deptry (unused/missing deps)
        entry: uv run deptry src
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: temporal-tests
        name: temporal tests
        entry: bash -c 'HYPOTHESIS_DATABASE_FILE=/tmp/.hypothesis uv run pytest assays/test_ribosome_dispatch_enzyme.py assays/test_polysome.py -x -q -p no:cacheprovider -p no:hypothesis'
        language: system
        pass_filenames: false
        files: (polysome/|ribosome_dispatch|temporal)
        stages: [pre-push]

      - id: ci-full-suite
        name: CI (full test suite on ganglion, async)
        entry: bash -c 'nohup ci-push > /dev/null 2>&1 &'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
