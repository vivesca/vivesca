# sweep.conf — signal transduction parameters for differential evolution sweep
# tier_authority: LLM review may adjust values within stated bounds.

[selection]
# Minimum number of observed phenotypes required before a tool can be evaluated.
# bounds: 1–20
min_phenotypes = 3

# Maximum retries when LLM generation fails before abandoning a candidate.
# bounds: 1–10
max_retries = 3

# Fitness threshold above which a tool is considered stable (no sweep needed).
# bounds: 0.5–1.0
fitness_plateau = 0.8

# Number of new candidate descriptions generated per sweep generation.
# bounds: 1–10
offspring_per_generation = 2
